<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario de visita</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .section { margin-bottom: 30px; padding: 15px; border: 1px solid #ccc; border-radius: 8px; }
        input, select, textarea { width: 100%; padding: 8px; margin: 6px 0 12px 0; }
        button { font-size: 16px; }
        a { color:#1d3c6a; font-weight:bold; }
    </style>
</head>

<body>

<!-- ========================= -->
<!--   DATOS DEL COMPRADOR    -->
<!-- ========================= -->

<div class="section">
    <h3>Datos del comprador</h3>

    <label>Nombre completo:</label>
    <input type="text" id="nombre">

    <label>Teléfono:</label>
    <input type="text" id="telefono">

    <label>Email:</label>
    <input type="email" id="email">

    <label>DNI / NIE:</label>
    <input type="text" id="dni">

    <button onclick="agregarComprador()" style="
        background:#1d3c6a; color:white; padding:10px 15px;
        border:none; border-radius:6px; cursor:pointer;">
        Añadir otro comprador / visitante
    </button>

    <div id="listaCompradores"></div>
</div>

<!-- ========================= -->
<!--     DATOS DEL AGENTE     -->
<!-- ========================= -->

<div class="section">
    <h3>Datos del agente</h3>

    <label>Nombre del agente:</label>
    <input type="text" id="agente" value="Antonio Avecilla">

    <label>Teléfono del agente:</label>
    <input type="text" id="telefonoAgente" value="+34699369300">

    <label>Email del agente:</label>
    <input type="email" id="emailAgente" value="antonio.avecilla@iadespana.es">
</div>

<!-- ========================= -->
<!--   DATOS DEL INMUEBLE     -->
<!-- ========================= -->

<div class="section">
    <h3>Datos del inmueble</h3>

    <label>Referencia:</label>
    <input type="text" id="referencia" value="675861">

    <label>Mandato:</label>
    <input type="text" id="mandato" value="36952">

    <label>Enlace al inmueble:</label>
    <p>
        <a id="enlaceInmueble" 
           href="https://www.iadespana.es/anuncio/casa-venta-5-habitaciones-chiclana-de-la-frontera-693m2/r675861" 
           target="_blank">
           https://www.iadespana.es/anuncio/casa-venta-5-habitaciones-chiclana-de-la-frontera-693m2/r675861
        </a>
    </p>
</div>

<!-- ========================= -->
<!--       BOTÓN ENVIAR       -->
<!-- ========================= -->

<div class="section">
    <button onclick="enviarWhatsApp()" style="
        background:#1d3c6a; color:white; padding:12px 18px;
        border:none; border-radius:6px; cursor:pointer;">
        Enviar datos
    </button>
</div>

<!-- ========================= -->
<!--         JAVASCRIPT       -->
<!-- ========================= -->

<script>

let contadorCompradores = 1;

function agregarComprador() {
    contadorCompradores++;

    const div = document.createElement("div");
    div.className = "section";
    div.innerHTML = `
        <h4>Comprador / visitante ${contadorCompradores}</h4>

        <label>Nombre completo:</label>
        <input type="text" class="nombreExtra">

        <label>Teléfono:</label>
        <input type="text" class="telefonoExtra">

        <label>Email:</label>
        <input type="email" class="emailExtra">

        <label>DNI / NIE:</label>
        <input type="text" class="dniExtra">
    `;

    document.getElementById("listaCompradores").appendChild(div);
}

function enviarWhatsApp() {

    if (!nombre.value.trim() || !telefono.value.trim()) {
        alert("Por favor, rellena al menos nombre y teléfono.");
        return;
    }

    let extras = "";
    const nombres = document.querySelectorAll(".nombreExtra");
    const telefonos = document.querySelectorAll(".telefonoExtra");
    const emails = document.querySelectorAll(".emailExtra");
    const dnis = document.querySelectorAll(".dniExtra");

    for (let i = 0; i < nombres.length; i++) {
        extras += `\n\nAcompañante ${i+2}:\nNombre: ${nombres[i].value}\nTeléfono: ${telefonos[i].value}\nEmail: ${emails[i].value}\nDNI: ${dnis[i].value}`;
    }

    const enlace = document.getElementById("enlaceInmueble").href;

    const mensaje =
        "Datos de la visita:\n\n" +
        "Cliente: " + nombre.value +
        "\nTeléfono: " + telefono.value +
        "\nEmail: " + email.value +
        "\nDNI: " + dni.value +
        extras +
        "\n\nReferencia: " + referencia.value +
        "\nMandato: " + mandato.value +
        "\nEnlace: " + enlace +
        "\n\nEl agente contactará para fijar la cita.";

    // WhatsApp al agente (solo a ti)
    window.open("https://wa.me/" +
        telefonoAgente.value.replace(/[^0-9]/g,"") +
        "?text=" + encodeURIComponent(mensaje), "_blank");

    alert("Datos enviados correctamente.");
}

</script>

</body>
</html>
