<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario de visita</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .section { margin-bottom: 30px; padding: 15px; border: 1px solid #ccc; border-radius: 8px; }
        input, select { width: 100%; padding: 8px; margin: 6px 0 12px 0; }
        button { font-size: 16px; cursor: pointer; }
        a { color:#1d3c6a; font-weight:bold; }
        .delete-btn {
            background: #b30000;
            color: white;
            padding: 6px 10px;
            border: none;
            border-radius: 5px;
            margin-top: 10px;
        }
        #copyBox {
            display: none;
            margin-top: 20px;
            padding: 15px;
            border: 2px solid #1d3c6a;
            border-radius: 8px;
            background: #f4f8ff;
        }
        #copyButton {
            background: #1d3c6a;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<!-- LOGO IAD -->
<div style="text-align:center; margin-bottom:25px;">
    <img src="IAD-logo.jpeg" alt="IAD Real Estate" style="width:180px;">
</div>

<!-- ========================= -->
<!--   DATOS DEL COMPRADOR    -->
<!-- ========================= -->

<div class="section">
    <h3>Datos del comprador</h3>

    <label>Nombre completo:</label>
    <input type="text" id="nombre" required>

    <label>Prefijo telefónico:</label>
    <select id="prefijo">
        <option value="+34">🇪🇸 España (+34)</option>
        <option value="+33">🇫🇷 Francia (+33)</option>
        <option value="+351">🇵🇹 Portugal (+351)</option>
        <option value="+39">🇮🇹 Italia (+39)</option>
        <option value="+49">🇩🇪 Alemania (+49)</option>
        <option value="+44">🇬🇧 Reino Unido (+44)</option>
        <option value="+1">🇺🇸 USA (+1)</option>
        <option value="+52">🇲🇽 México (+52)</option>
        <option value="+55">🇧🇷 Brasil (+55)</option>
        <option value="+57">🇨🇴 Colombia (+57)</option>
        <option value="+58">🇻🇪 Venezuela (+58)</option>
        <option value="+56">🇨🇱 Chile (+56)</option>
        <option value="+54">🇦🇷 Argentina (+54)</option>
        <option value="+51">🇵🇪 Perú (+51)</option>
        <option value="+506">🇨🇷 Costa Rica (+506)</option>
        <option value="+507">🇵🇦 Panamá (+507)</option>
        <option value="+593">🇪🇨 Ecuador (+593)</option>
        <option value="+502">🇬🇹 Guatemala (+502)</option>
        <option value="+503">🇸🇻 El Salvador (+503)</option>
        <option value="+504">🇭🇳 Honduras (+504)</option>
        <option value="+505">🇳🇮 Nicaragua (+505)</option>
        <option value="+53">🇨🇺 Cuba (+53)</option>
    </select>

    <label>Teléfono:</label>
    <input type="text" id="telefono" required>

    <label>Email:</label>
    <input type="email" id="email" required>

    <label>DNI / NIE / Documento extranjero:</label>
    <input type="text" id="dni" required>

    <button onclick="agregarComprador()" style="
        background:#1d3c6a; color:white; padding:10px 15px;
        border:none; border-radius:6px;">
        Añadir acompañante
    </button>

    <div id="listaCompradores"></div>
</div>

<!-- ========================= -->
<!--     DATOS DEL AGENTE     -->
<!-- ========================= -->

<div class="section">
    <h3>Datos del agente</h3>

    <label>Nombre del agente:</label>
    <input type="text" id="agente" value="Antonio Avecilla" required>

    <label>Teléfono del agente:</label>
    <input type="text" id="telefonoAgente" value="+34699369300" required>

    <label>Email del agente:</label>
    <input type="email" id="emailAgente" value="antonio.avecilla@iadespana.es" required>
</div>

<!-- ========================= -->
<!--   DATOS DEL INMUEBLE     -->
<!-- ========================= -->

<div class="section">
    <h3>Datos del inmueble</h3>

    <label>Referencia:</label>
    <input type="text" id="referencia" value="675861" required>

    <label>Mandato:</label>
    <input type="text" id="mandato" value="36952" required>

    <label>Enlace al inmueble:</label>
    <p>
        <a id="enlaceInmueble" 
           href="https://www.iadespana.es/anuncio/casa-venta-5-habitaciones-chiclana-de-la-frontera-693m2/r675861" 
           target="_blank">
           https://www.iadespana.es/anuncio/casa-venta-5-habitaciones-chiclana-de-la-frontera-693m2/r675861
        </a>
    </p>
</div>

<!-- ========================= -->
<!--       BOTÓN ENVIAR       -->
<!-- ========================= -->

<div class="section">
    <button onclick="enviarWhatsApp()" style="
        background:#1d3c6a; color:white; padding:12px 18px;
        border:none; border-radius:6px;">
        Enviar datos
    </button>
</div>

<!-- ========================= -->
<!--   CAJA DE COPIAR DATOS   -->
<!-- ========================= -->

<div id="copyBox">
    <h3>Datos listos para copiar</h3>
    <textarea id="copyText" style="width:100%; height:180px;"></textarea>
    <button id="copyButton" onclick="copiarTexto()">Copiar datos</button>
</div>

<!--         JAVASCRIPT       -->
<!-- ========================= -->

<script>
/* … (todo tu JS sigue igual, no lo repito para no alargar) … */
</script>

</body>
</html>
