<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario de visita</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .section { margin-bottom: 30px; padding: 15px; border: 1px solid #ccc; border-radius: 8px; }
        input, select { width: 100%; padding: 8px; margin: 6px 0 12px 0; }
        button { font-size: 16px; cursor: pointer; }
        a { color:#1d3c6a; font-weight:bold; }
        .delete-btn {
            background: #b30000;
            color: white;
            padding: 6px 10px;
            border: none;
            border-radius: 5px;
            margin-top: 10px;
        }
        #copyBox {
            display: none;
            margin-top: 20px;
            padding: 15px;
            border: 2px solid #1d3c6a;
            border-radius: 8px;
            background: #f4f8ff;
        }
        #copyButton {
            background: #1d3c6a;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<!-- LOGO NUEVO AJUSTADO -->
<div style="text-align:center; margin:10px 0 25px 0;">
    <img src="nuevo-logo.jpeg" alt="IAD Real Estate" style="width:110px; opacity:0.95;">
</div>

<!-- ========================= -->
<!--   DATOS DEL COMPRADOR    -->
<!-- ========================= -->

<div class="section">
    <h3>Datos del comprador</h3>

    <label>Nombre completo:</label>
    <input type="text" id="nombre" required>

    <label>Prefijo telefónico:</label>
    <select id="prefijo">
        <option value="+34">🇪🇸 España (+34)</option>
        <option value="+33">🇫🇷 Francia (+33)</option>
        <option value="+351">🇵🇹 Portugal (+351)</option>
        <option value="+39">🇮🇹 Italia (+39)</option>
        <option value="+49">🇩🇪 Alemania (+49)</option>
        <option value="+44">🇬🇧 Reino Unido (+44)</option>
        <option value="+1">🇺🇸 USA (+1)</option>
        <option value="+52">🇲🇽 México (+52)</option>
        <option value="+55">🇧🇷 Brasil (+55)</option>
        <option value="+57">🇨🇴 Colombia (+57)</option>
        <option value="+58">🇻🇪 Venezuela (+58)</option>
        <option value="+56">🇨🇱 Chile (+56)</option>
        <option value="+54">🇦🇷 Argentina (+54)</option>
        <option value="+51">🇵🇪 Perú (+51)</option>
        <option value="+506">🇨🇷 Costa Rica (+506)</option>
        <option value="+507">🇵🇦 Panamá (+507)</option>
        <option value="+593">🇪🇨 Ecuador (+593)</option>
        <option value="+502">🇬🇹 Guatemala (+502)</option>
        <option value="+503">🇸🇻 El Salvador (+503)</option>
        <option value="+504">🇭🇳 Honduras (+504)</option>
        <option value="+505">🇳🇮 Nicaragua (+505)</option>
        <option value="+53">🇨🇺 Cuba (+53)</option>
    </select>

    <label>Teléfono:</label>
    <input type="text" id="telefono" required>

    <label>Email:</label>
    <input type="email" id="email" required>

    <label>DNI / NIE / Documento extranjero:</label>
    <input type="text" id="dni" required>

    <button onclick="agregarComprador()" style="
        background:#1d3c6a; color:white; padding:10px 15px;
        border:none; border-radius:6px;">
        Añadir acompañante
    </button>

    <div id="listaCompradores"></div>
</div>

<!-- ========================= -->
<!--     DATOS DEL AGENTE     -->
<!-- ========================= -->

<div class="section">
    <h3>Datos del agente</h3>

    <label>Nombre del agente:</label>
    <input type="text" id="agente" value="Antonio Avecilla" required>

    <label>Teléfono del agente:</label>
    <input type="text" id="telefonoAgente" value="+34699369300" required>

    <label>Email del agente:</label>
    <input type="email" id="emailAgente" value="antonio.avecilla@iadespana.es" required>
</div>

<!-- ========================= -->
<!--   DATOS DEL INMUEBLE     -->
<!-- ========================= -->

<div class="section">
    <h3>Datos del inmueble</h3>

    <label>Referencia:</label>
    <input type="text" id="referencia" value="675861" required>

    <label>Mandato:</label>
    <input type="text" id="mandato" value="36952" required>

    <label>Enlace al inmueble:</label>
    <p>
        <a id="enlaceInmueble" 
           href="https://www.iadespana.es/anuncio/casa-venta-5-habitaciones-chiclana-de-la-frontera-693m2/r675861" 
           target="_blank">
           https://www.iadespana.es/anuncio/casa-venta-5-habitaciones-chiclana-de-la-frontera-693m2/r675861
        </a>
    </p>
</div>

<!-- ========================= -->
<!--       BOTÓN ENVIAR       -->
<!-- ========================= -->

<div class="section">
    <button onclick="enviarWhatsApp()" style="
        background:#1d3c6a; color:white; padding:12px 18px;
        border:none; border-radius:6px;">
        Enviar datos
    </button>
</div>

<!-- ========================= -->
<!--   CAJA DE COPIAR DATOS   -->
<!-- ========================= -->

<div id="copyBox">
    <h3>Datos listos para copiar</h3>
    <textarea id="copyText" style="width:100%; height:180px;"></textarea>
    <button id="copyButton" onclick="copiarTexto()">Copiar datos</button>
</div>

<!-- ========================= -->
<!--         JAVASCRIPT       -->
<!-- ========================= -->

<script>

let contadorCompradores = 0;

function agregarComprador() {
    contadorCompradores++;

    const div = document.createElement("div");
    div.className = "section";
    div.id = "acompanante_" + contadorCompradores;

    div.innerHTML = `
        <h4>Acompañante ${contadorCompradores}</h4>

        <label>Nombre completo:</label>
        <input type="text" class="nombreExtra" required>

        <label>DNI / NIE / Documento extranjero:</label>
        <input type="text" class="dniExtra" required>

        <button class="delete-btn" onclick="eliminarAcompanante('${div.id}')">
            Eliminar acompañante
        </button>
    `;

    document.getElementById("listaCompradores").appendChild(div);
}

function eliminarAcompanante(id) {
    document.getElementById(id).remove();
}

function esDNIEspanol(dni) {
    dni = dni.toUpperCase().trim();
    dni = dni.replace(/^[X]/, "0").replace(/^[Y]/, "1").replace(/^[Z]/, "2");
    const regex = /^[0-9]{8}[A-Z]$/;
    if (!regex.test(dni)) return false;
    const numero = dni.substring(0, 8);
    const letra = dni.substring(8, 9);
    const letras = "TRWAGMYFPDXBNJZSQVHLCKE";
    return letra === letras[numero % 23];
}

function validarEmail(email) {
    const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    return regex.test(email.trim());
}

function copiarTexto() {
    const textarea = document.getElementById("copyText");
    textarea.select();
    document.execCommand("copy");
    alert("Datos copiados");
}

function enviarWhatsApp() {

    if (!nombre.value.trim() || !telefono.value.trim() || !email.value.trim() || !dni.value.trim()) {
        alert("Todos los campos del comprador son obligatorios.");
        return;
    }

    if (!validarEmail(email.value)) {
        alert("El email del comprador no es válido.");
        return;
    }

    let notaDocumento = "";
    if (!esDNIEspanol(dni.value)) {
        notaDocumento = " (Documento extranjero)";
    }

    const telefonoCompleto = prefijo.value + " " + telefono.value.trim();

    let extras = "";
    const nombres = document.querySelectorAll(".nombreExtra");
    const dnis = document.querySelectorAll(".dniExtra");

    for (let i = 0; i < nombres.length; i++) {

        if (!nombres[i].value.trim() || !dnis[i].value.trim()) {
            alert("Todos los campos de los acompañantes son obligatorios.");
            return;
        }

        let notaAcomp = "";
        if (!esDNIEspanol(dnis[i].value)) {
            notaAcomp = " (Documento extranjero)";
        }

        extras += `\n\nAcompañante ${i+1}:\nNombre: ${nombres[i].value}\nDNI: ${dnis[i].value}${notaAcomp}`;
    }

    const enlace = document.getElementById("enlaceInmueble").href;

    const mensaje =
        "Datos del comprador:\n\n" +
        "Nombre: " + nombre.value +
        "\nTeléfono: " + telefonoCompleto +
        "\nEmail: " + email.value +
        "\nDNI: " + dni.value + notaDocumento +
        extras +
        "\n\nReferencia: " + referencia.value +
        "\nMandato: " + mandato.value +
        "\nEnlace al inmueble: " + enlace +
        "\n\nEl agente contactará para fijar la cita.";

    document.getElementById("copyBox").style.display = "block";
    document.getElementById("copyText").value = mensaje;

    window.open("https://wa.me/" +
        telefonoAgente.value.replace(/[^0-9]/g,"") +
        "?text=" + encodeURIComponent(mensaje), "_blank");

    alert("Datos enviados correctamente.");
}

</script>

</body>
</html>
